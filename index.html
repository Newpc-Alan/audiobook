<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audiobooks — Portal do Educador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;500;600;700&display=swap');
:root{
  --bg:#F5F8FB;--sf:#FFFFFF;--sf2:#EAF1F8;
  --pr:#37B1DA;--prdk:#1E8FB8;--prl:rgba(55,177,218,.14);
  --acc:#B6D752;--accdk:#9BC03A;
  --tx:#1E324A;--tx2:#3E5168;--mu:#7A8DA0;
  --panel:#0F1E2E;--panel2:#08131F;--navy:#1E324A;
  --s1:0 2px 10px rgba(15,30,46,.08);
  --s2:0 6px 24px rgba(15,30,46,.14);
  --s3:0 20px 60px rgba(15,30,46,.22);
  --ft:'Baloo 2',cursive;--fb:'Nunito',sans-serif;--tr:.22s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);
  -webkit-user-select:none;-moz-user-select:none;user-select:none;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes splOut{to{opacity:0;pointer-events:none;}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1.2)}}
@keyframes wave{0%,100%{height:8px}50%{height:22px}}
@keyframes vinyl{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#1E324A 0%,#0F1E2E 50%,#37B1DA 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  animation:splOut .5s ease 2.2s forwards;}
.sp-logo{width:120px;height:120px;border-radius:50%;
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 4px rgba(255,255,255,.08);
  animation:popIn .7s cubic-bezier(.175,.885,.32,1.275) .1s both;}
.sp-t{font-family:var(--ft);font-size:clamp(24px,5vw,42px);font-weight:800;color:#fff;
  text-shadow:0 4px 20px rgba(0,0,0,.3);margin-top:18px;text-align:center;
  animation:fadeIn .5s ease .5s both;}
.sp-s{font-size:14px;color:#B6D752;margin-top:4px;font-weight:600;letter-spacing:.5px;
  animation:fadeIn .5s ease .75s both;}
.sp-d{display:flex;gap:8px;margin-top:30px;animation:fadeIn .4s ease 1s both;}
.sp-dt{width:9px;height:9px;border-radius:50%;background:#B6D752;
  animation:pulse .8s ease-in-out infinite alternate;}
.sp-dt:nth-child(2){animation-delay:.2s;background:#37B1DA;}
.sp-dt:nth-child(3){animation-delay:.4s;background:#fff;}

.page{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}

/* GALERIA */
#pg-gal{background:var(--bg);}
.gh{background:linear-gradient(135deg,#1E324A 0%,#0F1E2E 100%);
  padding:18px 22px 30px;position:relative;overflow:hidden;flex-shrink:0;}
.gh::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(55,177,218,.18) 0%,transparent 70%);
  top:-100px;left:-80px;pointer-events:none;}
.gh::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(182,215,82,.12) 0%,transparent 70%);
  bottom:-70px;right:-50px;pointer-events:none;}
.gh-row{display:flex;align-items:center;gap:14px;max-width:1200px;margin:0 auto;
  position:relative;z-index:1;}
.gh-logo-img{width:54px;height:54px;border-radius:50%;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.3),0 0 0 2px rgba(182,215,82,.3);}
.gh-text{flex:1;min-width:0;}
.gh-title{font-family:var(--ft);font-size:clamp(18px,3.5vw,28px);font-weight:800;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.25);line-height:1.1;}
.gh-tag{color:#B6D752;font-size:13px;margin-top:2px;font-weight:600;letter-spacing:.3px;}

.gc-bar{background:var(--sf);padding:11px 16px;box-shadow:var(--s1);
  border-bottom:1px solid #DDE5EE;flex-shrink:0;}
.cr{display:flex;gap:7px;align-items:center;max-width:1100px;margin:0 auto;flex-wrap:wrap;}
.si{flex:1;min-width:160px;padding:9px 16px;border:2px solid #DDE5EE;border-radius:50px;
  font-family:var(--fb);font-size:14px;outline:none;transition:var(--tr);background:var(--bg);
  color:var(--tx);}
.si:focus{border-color:var(--pr);background:#fff;box-shadow:0 0 0 4px var(--prl);}
.hb{padding:9px 14px;border:2px solid #DDE5EE;border-radius:50px;background:#fff;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--mu);transition:var(--tr);
  white-space:nowrap;font-family:var(--fb);}
.hb:hover{border-color:var(--pr);color:var(--pr);}
.pgb{font-size:12px;color:var(--mu);padding:7px 12px;background:var(--bg);
  border-radius:50px;border:1.5px solid #DDE5EE;white-space:nowrap;font-weight:600;}

.gb{flex:1;overflow-y:auto;padding:18px 16px 32px;max-width:1200px;margin:0 auto;width:100%;}
.gm{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;
  flex-wrap:wrap;gap:8px;}
.gcnt{font-size:13px;color:var(--mu);font-weight:600;}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}

/* CARD AUDIOBOOK — quadrado (formato álbum) */
.card{background:var(--sf);border-radius:14px;overflow:hidden;box-shadow:var(--s1);
  border:1.5px solid #E2EAF2;transition:var(--tr);animation:fadeIn .3s ease both;
  cursor:pointer;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-5px) scale(1.02);box-shadow:var(--s2);
  border-color:var(--pr);}
.ct{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--panel) 100%);
  overflow:hidden;position:relative;}
/* "Disco" decorativo — vinil estilizado */
.ct-disc{width:80%;height:80%;border-radius:50%;
  background:radial-gradient(circle at center,
    var(--pr) 0%,var(--pr) 8%,
    var(--panel2) 8%,var(--panel2) 12%,
    var(--navy) 12%,var(--navy) 50%,
    var(--panel2) 50%,var(--panel2) 52%,
    var(--navy) 52%,var(--navy) 70%,
    var(--panel2) 70%,var(--panel2) 72%,
    var(--navy) 72%);
  box-shadow:inset 0 0 30px rgba(0,0,0,.5);
  position:relative;display:flex;align-items:center;justify-content:center;}
.ct-disc::after{content:'🎧';font-size:32px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
.ct-num{position:absolute;top:10px;left:10px;
  background:rgba(15,30,46,.85);color:var(--acc);
  font-family:var(--ft);font-size:11px;font-weight:800;
  padding:3px 9px;border-radius:50px;backdrop-filter:blur(4px);
  border:1px solid rgba(182,215,82,.3);}
.ct-badge{position:absolute;top:10px;right:10px;
  background:linear-gradient(135deg,#B6D752,#9BC03A);color:var(--navy);
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  padding:4px 8px;border-radius:50px;box-shadow:var(--s1);}
/* Barra de progresso na capa (continue ouvindo) */
.ct-prog{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(0,0,0,.3);}
.ct-prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--pr));
  transition:width .3s;box-shadow:0 0 8px rgba(182,215,82,.5);}
.ct-resume{position:absolute;bottom:8px;left:8px;right:8px;
  background:rgba(15,30,46,.9);color:var(--acc);
  font-size:10px;font-weight:700;padding:5px 9px;border-radius:50px;
  text-align:center;backdrop-filter:blur(6px);
  border:1px solid rgba(182,215,82,.3);}
/* Onda sonora animada no hover */
.ct-wave{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  gap:3px;opacity:0;transition:opacity .3s;background:rgba(15,30,46,.7);
  backdrop-filter:blur(2px);}
.card:hover .ct-wave{opacity:1;}
.ct-wave span{width:4px;background:var(--acc);border-radius:2px;
  animation:wave .8s ease-in-out infinite;}
.ct-wave span:nth-child(1){animation-delay:0s;}
.ct-wave span:nth-child(2){animation-delay:.1s;}
.ct-wave span:nth-child(3){animation-delay:.2s;}
.ct-wave span:nth-child(4){animation-delay:.3s;}
.ct-wave span:nth-child(5){animation-delay:.4s;}
.cn-w{padding:11px 12px 12px;}
.cn{font-size:12px;font-weight:700;color:var(--tx);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:9px;min-height:32px;}
.cb{width:100%;padding:8px;background:linear-gradient(135deg,var(--pr),var(--prdk));
  color:#fff;border:none;border-radius:8px;
  font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer;
  transition:var(--tr);box-shadow:0 2px 8px rgba(55,177,218,.3);
  display:flex;align-items:center;justify-content:center;gap:5px;}
.cb:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(55,177,218,.4);}
.cb.resume{background:linear-gradient(135deg,var(--acc),var(--accdk));color:var(--navy);
  box-shadow:0 2px 8px rgba(182,215,82,.4);}
.cb.resume:hover{box-shadow:0 4px 12px rgba(182,215,82,.5);}

.pag{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:18px 0 4px;flex-wrap:wrap;}
.pb{padding:7px 14px;border:1.5px solid #DDE5EE;border-radius:50px;background:#fff;
  cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:600;
  color:var(--mu);transition:var(--tr);}
.pb:hover{border-color:var(--pr);color:var(--pr);}
.pb.on{background:var(--pr);border-color:var(--pr);color:#fff;
  box-shadow:0 2px 8px rgba(55,177,218,.3);}
.pb:disabled{opacity:.35;cursor:not-allowed;}

/* SETUP */
.setup-box{background:var(--sf);border-radius:20px;padding:32px;max-width:560px;
  margin:24px auto;box-shadow:var(--s2);border:1.5px solid #E2EAF2;text-align:center;}
.setup-ico{font-size:52px;margin-bottom:14px;}
.setup-title{font-family:var(--ft);font-size:22px;font-weight:800;margin-bottom:8px;
  color:var(--tx);}
.setup-desc{color:var(--mu);font-size:14px;line-height:1.7;margin-bottom:20px;}
.setup-inp{width:100%;padding:12px 16px;border:2px solid #DDE5EE;border-radius:12px;
  font-family:var(--fb);font-size:15px;outline:none;transition:var(--tr);
  margin-bottom:12px;text-align:center;color:var(--tx);}
.setup-inp:focus{border-color:var(--pr);box-shadow:0 0 0 4px var(--prl);}
.setup-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pr),var(--prdk));
  color:#fff;border:none;border-radius:12px;font-family:var(--ft);font-size:16px;
  font-weight:700;cursor:pointer;transition:var(--tr);
  box-shadow:0 4px 14px rgba(55,177,218,.35);}
.setup-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(55,177,218,.45);}
.setup-steps{background:var(--sf2);border-radius:12px;padding:16px 20px;text-align:left;
  font-size:13px;color:var(--tx);line-height:2.2;margin-top:16px;}
.setup-steps a{color:var(--pr);font-weight:700;text-decoration:none;}
.setup-steps a:hover{text-decoration:underline;}
.setup-steps code{background:#fff;padding:1px 6px;border-radius:4px;font-size:12px;
  color:var(--prdk);}
.setup-note{font-size:12px;color:var(--mu);margin-top:10px;line-height:1.6;}

/* ══ PLAYER ══ */
#pg-pl{background:var(--panel);}
.pt{height:54px;background:var(--panel2);border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:100;}
.pbk{width:34px;height:34px;background:rgba(55,177,218,.15);border:1px solid rgba(55,177,218,.3);
  border-radius:8px;color:#fff;font-size:18px;cursor:pointer;transition:var(--tr);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pbk:hover{background:rgba(55,177,218,.3);border-color:var(--pr);}
.pt-logo{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 0 1.5px rgba(182,215,82,.4);}
.pt-ttl{font-family:var(--ft);font-weight:700;font-size:14px;flex:1;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;color:#fff;}

/* Corpo do player */
.pb-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;overflow-y:auto;
  background:radial-gradient(ellipse at top,rgba(55,177,218,.08) 0%,transparent 60%);}

.pl-disc{width:min(280px,55vmin);aspect-ratio:1/1;border-radius:50%;
  background:radial-gradient(circle at center,
    var(--pr) 0%,var(--pr) 6%,
    var(--panel2) 6%,var(--panel2) 9%,
    var(--navy) 9%,var(--navy) 35%,
    var(--panel2) 35%,var(--panel2) 36%,
    var(--navy) 36%,var(--navy) 60%,
    var(--panel2) 60%,var(--panel2) 61%,
    var(--navy) 61%,var(--navy) 80%,
    var(--panel2) 80%,var(--panel2) 81%,
    var(--navy) 81%);
  box-shadow:0 16px 60px rgba(0,0,0,.5),inset 0 0 60px rgba(0,0,0,.6);
  position:relative;display:flex;align-items:center;justify-content:center;
  margin-bottom:22px;animation-play-state:paused;}
.pl-disc.playing{animation:vinyl 8s linear infinite;}
.pl-disc::before{content:'';position:absolute;width:32%;height:32%;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--pr));
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 20px rgba(0,0,0,.3);}
.pl-disc::after{content:'🎧';position:absolute;font-size:38px;z-index:2;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.5));}

.pl-info{text-align:center;color:#fff;margin-bottom:24px;max-width:90%;}
.pl-name{font-family:var(--ft);font-size:clamp(18px,4vw,24px);font-weight:800;
  line-height:1.2;margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pl-meta{font-size:12px;color:var(--acc);font-weight:600;letter-spacing:.3px;}

/* Barra de progresso */
.pl-progress{width:100%;max-width:520px;margin-bottom:8px;}
.pl-bar{height:6px;background:rgba(255,255,255,.1);border-radius:50px;cursor:pointer;
  position:relative;overflow:hidden;transition:height .15s;}
.pl-bar:hover{height:9px;}
.pl-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--pr));
  border-radius:50px;width:0%;transition:width .1s linear;
  box-shadow:0 0 12px rgba(182,215,82,.4);position:relative;}
.pl-bar-fill::after{content:'';position:absolute;right:-6px;top:50%;
  transform:translateY(-50%);width:12px;height:12px;border-radius:50%;
  background:#fff;box-shadow:0 0 8px rgba(255,255,255,.6);
  opacity:0;transition:opacity .15s;}
.pl-bar:hover .pl-bar-fill::after{opacity:1;}
.pl-times{display:flex;justify-content:space-between;width:100%;max-width:520px;
  font-size:11px;color:rgba(255,255,255,.6);font-weight:600;font-variant-numeric:tabular-nums;
  margin-bottom:24px;}

/* Controles */
.pl-ctrl{display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:18px;}
.pl-bt{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;
  font-size:18px;transition:var(--tr);
  display:flex;align-items:center;justify-content:center;}
.pl-bt:hover{background:rgba(55,177,218,.25);border-color:var(--pr);}
.pl-play{width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--pr),var(--prdk));
  border:none;color:#fff;cursor:pointer;font-size:26px;
  box-shadow:0 8px 24px rgba(55,177,218,.4);transition:var(--tr);
  display:flex;align-items:center;justify-content:center;}
.pl-play:hover{transform:scale(1.06);box-shadow:0 10px 28px rgba(55,177,218,.55);}
.pl-play:disabled{opacity:.5;cursor:wait;}

/* Velocidade */
.pl-spd{display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);padding:5px;border-radius:50px;
  border:1px solid rgba(255,255,255,.1);}
.pl-spd-bt{padding:6px 12px;border-radius:50px;background:transparent;
  border:none;color:rgba(255,255,255,.6);font-family:var(--fb);
  font-size:11px;font-weight:700;cursor:pointer;transition:var(--tr);}
.pl-spd-bt:hover{color:#fff;}
.pl-spd-bt.on{background:var(--pr);color:#fff;
  box-shadow:0 2px 8px rgba(55,177,218,.4);}

/* Loading state */
.pl-load{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(15,30,46,.85);
  backdrop-filter:blur(8px);z-index:200;gap:14px;
  transition:opacity .3s;}
.pl-load.off{opacity:0;pointer-events:none;}
.pl-load-sp{width:48px;height:48px;border:4px solid rgba(55,177,218,.15);
  border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;}
.pl-load-tx{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--panel);color:#fff;padding:10px 20px;border-radius:50px;
  font-size:12px;font-weight:600;
  box-shadow:var(--s3),0 0 0 1px rgba(182,215,82,.2);
  z-index:9000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESPONSIVO */
@media(max-width:1024px){.cg{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));}}
@media(max-width:768px){
  .cg{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .gh{padding:14px 16px 24px;}.gh-logo-img{width:46px;height:46px;}
}
@media(max-width:580px){
  .gh{padding:12px 14px 22px;}.gh-logo-img{width:40px;height:40px;}
  .gh-title{font-size:18px;}.gh-tag{font-size:11px;}
  .gc-bar{padding:9px 12px;}
  .cg{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;}
  .cn{font-size:11px;}.setup-box{padding:22px 18px;margin:14px;}
  .pt{padding:0 10px;height:50px;}.pt-logo{width:28px;height:28px;}
  .pl-play{width:60px;height:60px;font-size:22px;}
  .pl-bt{width:42px;height:42px;font-size:16px;}
  .pb-body{padding:18px 14px;}
}
</style>
</head>
<body>

  if (stored) API_KEY = stored;

  loadProgressMap();
  audio = document.getElementById('audio');
  bindAudio();

  document.getElementById('srch').addEventListener('input', e=>{
    clearTimeout(srchTmr);
    const q = e.target.value.trim().toLowerCase();
    srchTmr = setTimeout(()=>{
      filtFiles = q
        ? allFiles.filter(f => normTitle(f.name).toLowerCase().includes(q))
        : [...allFiles];
      galPg = 1;
      renderGal();
    }, 200);
  });

  document.getElementById('pl-bar').addEventListener('click', e => {
    if (!audio.duration || !isFinite(audio.duration)) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = Math.max(0, Math.min(audio.duration, ratio * audio.duration));
  });

  document.addEventListener('keydown', e=>{
    if (e.key === 'Escape') {
      const plPage = document.getElementById('pg-pl');
      if (plPage.classList.contains('active')) goGal();
    }
    // Spacebar = play/pause (apenas no player)
    if (e.code === 'Space' && document.getElementById('pg-pl').classList.contains('active')) {
      e.preventDefault();
      togglePlay();
    }
  });

  loadDrive();
});

// ================================================================
// GOOGLE DRIVE
// ================================================================
async function loadDrive() {
  setGcnt('Conectando ao Google Drive...');
  document.getElementById('cg').innerHTML = mkSpin('Carregando audiobooks...');
  document.getElementById('pag').innerHTML = '';

  try {
    allFiles  = await fetchAllAudios();
    filtFiles = [...allFiles];
    galPg = 1;
    renderGal();
    toast(`✅ ${allFiles.length} audiobook${allFiles.length!==1?'s':''} carregado${allFiles.length!==1?'s':''}!`);
  } catch(err) {
    const m = err.message || '';
    if (m.includes('403') || m.includes('allowlist') || m.toLowerCase().includes('fetch'))
      showKeyError();
    else if (m.includes('400') || m.toLowerCase().includes('key') || m.toLowerCase().includes('api key'))
      showConfigScreen('Chave de API inválida. Verifique e tente novamente.');
    else
      showConfigScreen(`Erro: ${m}`);
  }
}

function reloadDrive(){
  document.getElementById('srch').value = '';
  loadDrive();
}

async function fetchAllAudios() {
  let all=[], token='';
  // Aceita audio/mpeg E também filtra por nome terminando .mp3 (Drive às vezes retorna mimeType genérico)
  const mimeQuery = AUDIO_TYPES.map(t=>`mimeType='${t}'`).join(' or ');
  do {
    const p = new URLSearchParams({
      key: API_KEY,
      q: `'${FOLDER_ID}' in parents and trashed=false and (${mimeQuery} or name contains '.mp3')`,
      fields: 'nextPageToken,files(id,name,mimeType,thumbnailLink,modifiedTime,size)',
      pageSize: 1000,
      orderBy: 'name'
    });
    if (token) p.set('pageToken', token);
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?${p}`);
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      throw new Error(e.error?.message || String(r.status));
    }
    const d = await r.json();
    // Garantia extra: aceita só arquivos .mp3
    const files = (d.files || []).filter(f => /\.mp3$/i.test(f.name));
    all = all.concat(files);
    token = d.nextPageToken || '';
  } while(token);
  return all;
}

// ================================================================
// GALERIA
// ================================================================
function renderGal() {
  galTot = Math.ceil(filtFiles.length/PG_SIZE)||1;
  galPg  = Math.max(1, Math.min(galPg, galTot));
  const slice = filtFiles.slice((galPg-1)*PG_SIZE, galPg*PG_SIZE);
  const g = document.getElementById('cg');

  setGcnt(`${filtFiles.length} audiobook${filtFiles.length!==1?'s':''}` +
    (filtFiles.length!==allFiles.length ? ` (de ${allFiles.length})` : ''));
  document.getElementById('pgb').textContent = `Pg ${galPg}/${galTot}`;
  g.innerHTML = '';

  if (!slice.length) {
    g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:50px 0;color:var(--mu);">
      <div style="font-size:46px">🔍</div>
      <div style="margin-top:9px;font-weight:700">Nenhum audiobook encontrado</div></div>`;
    renderPag(); return;
  }

  slice.forEach((f,i) => {
    const name = normTitle(f.name);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i*18}ms`;

    const isNew = f.modifiedTime &&
      (Date.now() - new Date(f.modifiedTime).getTime()) < 14*24*60*60*1000;

    const prog = getProgress(f.id);
    const hasProg = prog && prog.d && prog.t > 5 && (prog.t < prog.d - 5);
    const pct = hasProg ? Math.min(100, (prog.t/prog.d)*100) : 0;

    // Numeração sequencial visível no canto (efeito playlist)
    const num = (galPg-1)*PG_SIZE + i + 1;

    card.innerHTML = `
      <div class="ct">
        <span class="ct-num">#${String(num).padStart(2,'0')}</span>
        ${isNew ? '<span class="ct-badge">Novo</span>' : ''}
        <div class="ct-disc"></div>
        <div class="ct-wave">
          <span style="height:14px"></span><span style="height:20px"></span>
          <span style="height:10px"></span><span style="height:18px"></span>
          <span style="height:12px"></span>
        </div>
        ${hasProg ? `
          <div class="ct-resume">▶ Continuar · ${fmtTime(prog.t)}</div>
          <div class="ct-prog"><div class="ct-prog-fill" style="width:${pct}%"></div></div>
        `:''}
      </div>
      <div class="cn-w">
        <div class="cn" title="${escapeAttr(name)}">${escapeHtml(name)}</div>
        <button class="cb ${hasProg?'resume':''}">
          ${hasProg ? '▶ Continuar' : '🎧 Ouvir agora'}
        </button>
      </div>`;

    card.onclick = ()=> openAudio(f);
    g.appendChild(card);
  });

  renderPag();
}

function renderPag() {
  const p = document.getElementById('pag');
  if (galTot <= 1) { p.innerHTML=''; return; }
  const btns = [];
  btns.push(`<button class="pb" onclick="goPg(${galPg-1})" ${galPg===1?'disabled':''}>‹</button>`);
  let start = Math.max(1, galPg-3);
  let end   = Math.min(galTot, start+6);
  if (end-start < 6) start = Math.max(1, end-6);
  if (start > 1) {
    btns.push(`<button class="pb" onclick="goPg(1)">1</button>`);
    if (start > 2) btns.push(`<span style="color:var(--mu);padding:0 4px;">…</span>`);
  }
  for (let i=start; i<=end; i++) {
    btns.push(`<button class="pb ${i===galPg?'on':''}" onclick="goPg(${i})">${i}</button>`);
  }
  if (end < galTot) {
    if (end < galTot-1) btns.push(`<span style="color:var(--mu);padding:0 4px;">…</span>`);
    btns.push(`<button class="pb" onclick="goPg(${galTot})">${galTot}</button>`);
  }
  btns.push(`<button class="pb" onclick="goPg(${galPg+1})" ${galPg===galTot?'disabled':''}>›</button>`);
  p.innerHTML = btns.join('');
}
function goPg(n) {
  if (n<1||n>galTot) return;
  galPg = n; renderGal();
  document.querySelector('.gb').scrollTop = 0;
}

// ================================================================
// PLAYER
// ================================================================
function openAudio(file) {
  curBook = file;
  const name = normTitle(file.name);

  document.getElementById('pt-ttl').textContent = name;
  document.getElementById('pl-name').textContent = name;

  let meta = 'Audiobook';
  if (file.size) {
    const mb = (Number(file.size)/1024/1024).toFixed(1);
    meta = `Audiobook • ${mb} MB`;
  }
  document.getElementById('pl-meta').textContent = meta;

  // Loading
  document.getElementById('pl-load').classList.remove('off');
  document.getElementById('pl-load-tx').textContent = 'Carregando áudio...';
  document.getElementById('pl-play').disabled = true;
  document.getElementById('pl-play').innerHTML = '▶';
  document.getElementById('pl-disc').classList.remove('playing');
  document.getElementById('pl-fill').style.width = '0%';
  document.getElementById('pl-cur').textContent = '0:00';
  document.getElementById('pl-dur').textContent = '0:00';

  // Reseta velocidade pra 1×
  setSpd(1);

  // URL de streaming — sistema de fallback com 3 endpoints
  // Se o primeiro falhar, tenta o próximo automaticamente
  curUrlIdx = 0;
  curUrls = [
    // 1ª tentativa: Drive API alt=media (mais confiável p/ arquivos grandes)
    `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`,
    // 2ª tentativa: usercontent (novo endpoint do Drive)
    `https://drive.usercontent.google.com/download?id=${file.id}&export=download&authuser=0&confirm=t`,
    // 3ª tentativa: legacy uc (funciona em arquivos pequenos)
    `https://drive.google.com/uc?export=download&id=${file.id}&confirm=t`
  ];
  audio.src = curUrls[0];
  audio.load();

  showPg('pg-pl');
}

function bindAudio() {
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('pl-dur').textContent = fmtTime(audio.duration);
    // Restaura posição salva
    if (curBook) {
      const prog = getProgress(curBook.id);
      if (prog && prog.t > 5 && prog.t < audio.duration - 5) {
        audio.currentTime = prog.t;
        toast(`▶ Retomando em ${fmtTime(prog.t)}`);
      }
    }
    document.getElementById('pl-load').classList.add('off');
    document.getElementById('pl-play').disabled = false;
  });

  audio.addEventListener('timeupdate', () => {
    const cur = audio.currentTime || 0;
    const dur = audio.duration || 0;
    document.getElementById('pl-cur').textContent = fmtTime(cur);
    if (dur > 0) {
      const pct = (cur/dur)*100;
      document.getElementById('pl-fill').style.width = pct + '%';
    }
    // Salva progresso a cada ~5s, throttled
    if (curBook) {
      clearTimeout(saveProgressTmr);
      saveProgressTmr = setTimeout(()=> updateProgress(curBook.id, cur, dur), 800);
    }
  });

  audio.addEventListener('play', () => {
    document.getElementById('pl-play').innerHTML = '❚❚';
    document.getElementById('pl-disc').classList.add('playing');
  });
  audio.addEventListener('pause', () => {
    document.getElementById('pl-play').innerHTML = '▶';
    document.getElementById('pl-disc').classList.remove('playing');
  });
  audio.addEventListener('ended', () => {
    document.getElementById('pl-play').innerHTML = '▶';
    document.getElementById('pl-disc').classList.remove('playing');
    if (curBook) clearProgress(curBook.id); // terminou: limpa
    toast('🏁 Audiobook concluído!');
  });

  audio.addEventListener('error', () => {
    // Tenta a próxima URL de fallback antes de desistir
    curUrlIdx++;
    if (curUrlIdx < curUrls.length) {
      console.log(`Tentando fallback ${curUrlIdx+1}/${curUrls.length}...`);
      document.getElementById('pl-load-tx').textContent =
        `Tentando método alternativo (${curUrlIdx+1}/${curUrls.length})...`;
      audio.src = curUrls[curUrlIdx];
      audio.load();
      return;
    }
    // Todos os fallbacks falharam: mostra erro com instruções claras
    document.getElementById('pl-load').classList.remove('off');
    document.getElementById('pl-load-tx').innerHTML =
      `⚠️ Não foi possível carregar este áudio.<br>
       <span style="font-size:11px;opacity:.7;margin-top:6px;display:block;">
       Verifique se está público e abaixo de 100MB.<br>
       Para arquivos grandes, use o Drive Direct Link.</span>
       <button onclick="goGal()" style="margin-top:14px;padding:8px 18px;
         background:var(--pr);border:none;border-radius:50px;color:#fff;
         font-weight:700;cursor:pointer;font-family:var(--fb);">
         ← Voltar à galeria
       </button>`;
  });

  audio.addEventListener('waiting', () => {
    document.getElementById('pl-load').classList.remove('off');
    document.getElementById('pl-load-tx').textContent = 'Buffering...';
  });
  audio.addEventListener('canplay', () => {
    document.getElementById('pl-load').classList.add('off');
  });
}

function togglePlay() {
  if (!audio.src) return;
  if (audio.paused) {
    const p = audio.play();
    if (p && p.catch) p.catch(err => toast('⚠️ Não foi possível iniciar: '+(err.message||err)));
  } else {
    audio.pause();
  }
}

function setSpd(rate) {
  audio.playbackRate = rate;
  document.querySelectorAll('.pl-spd-bt').forEach(b => {
    b.classList.toggle('on', parseFloat(b.dataset.spd) === rate);
  });
}

function goGal() {
  // Salva posição final antes de sair
  if (curBook && audio && audio.currentTime > 1) {
    updateProgress(curBook.id, audio.currentTime, audio.duration);
  }
  audio.pause();
  audio.removeAttribute('src');
  audio.load();
  curBook = null;
  showPg('pg-gal');
  // Re-render pra atualizar progresso visual nas capas
  renderGal();
}

// ================================================================
// UI
// ================================================================
function showPg(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setGcnt(t) { document.getElementById('gcnt').textContent = t; }
function mkSpin(msg) {
  return `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--mu);">
    <div style="margin:0 auto 16px;width:36px;height:36px;border:4px solid #DDE5EE;
      border-top-color:var(--pr);border-radius:50%;animation:spin .7s linear infinite;"></div>
    <div style="font-size:13px;font-weight:600;">${escapeHtml(msg)}</div>
  </div>`;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3200);
}

// ================================================================
// UTILS
// ================================================================
function normTitle(name) {
  return String(name)
    .replace(/\.mp3$/i,'')
    .replace(/[_-]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  if (m >= 60) {
    const h = Math.floor(m/60);
    const mm = m%60;
    return `${h}:${String(mm).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

// ================================================================
// CONFIG / ERRO
// ================================================================
function showConfigScreen(errMsg='') {
  setGcnt(errMsg ? '⚠️ ' + errMsg : 'Configuração necessária');
  document.getElementById('pag').innerHTML = '';
  document.getElementById('cg').innerHTML = `
    <div style="grid-column:1/-1;">
      <div class="setup-box">
        <div class="setup-ico">${errMsg?'⚠️':'🔑'}</div>
        <div class="setup-title">${errMsg?'Erro na API Key':'Conectar ao Google Drive'}</div>
        <div class="setup-desc">
          ${errMsg
            ? `<span style="color:#c0392b;">${escapeHtml(errMsg)}</span>`
            : 'Insira sua Google API Key para carregar o acervo de audiobooks diretamente do Google Drive.'}
        </div>
        <input class="setup-inp" id="key-inp" type="text"
          placeholder="AIzaSy..." value="${escapeAttr(API_KEY)}" autocomplete="off" spellcheck="false">
        <button class="setup-btn" onclick="applyKey()">🚀 Conectar ao Drive</button>
        <div class="setup-note">A chave fica salva apenas no seu navegador.</div>
        <div class="setup-steps">
          <strong>Como obter sua chave gratuita:</strong><br>
          1️⃣ <a href="https://console.cloud.google.com/apis/credentials" target="_blank">console.cloud.google.com/apis/credentials</a><br>
          2️⃣ <strong>APIs → Biblioteca → ative Google Drive API</strong><br>
          3️⃣ <strong>Credenciais → Criar → Chave de API</strong><br>
          4️⃣ Clique na chave → <strong>"Restrições"</strong> → <strong>"Nenhuma"</strong> → Salvar<br>
          5️⃣ Certifique que a pasta do Drive está com <strong>acesso público</strong>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('key-inp')?.focus(), 300);
}
function showConfig() { showConfigScreen(); }
function applyKey() {
  const k = (document.getElementById('key-inp')?.value || '').trim();
  if (!k) { toast('⚠️ Cole sua API Key no campo'); return; }
  API_KEY = k;
  localStorage.setItem(KEY_STORAGE, k);
  loadDrive();
}
function showKeyError() {
  setGcnt('⚠️ Chave com restrição de domínio');
  document.getElementById('pag').innerHTML = '';
  document.getElementById('cg').innerHTML = `
    <div style="grid-column:1/-1;">
      <div class="setup-box">
        <div class="setup-ico">🚫</div>
        <div class="setup-title">Remova a restrição da chave</div>
        <div class="setup-desc" style="color:#c0392b;">
          Sua API Key tem restrição de domínio HTTP. Para funcionar aqui, é preciso liberar.
        </div>
        <div class="setup-steps">
          <strong>Como ajustar:</strong><br>
          1️⃣ <a href="https://console.cloud.google.com/apis/credentials" target="_blank">console.cloud.google.com/apis/credentials</a><br>
          2️⃣ Clique na sua chave <code>${escapeHtml(API_KEY.slice(0,16))}...</code><br>
          3️⃣ Em <strong>"Restrições de aplicativo"</strong> → marque <strong>"Nenhuma"</strong><br>
          4️⃣ Clique em <strong>Salvar</strong> e aguarde 1 minuto<br>
          5️⃣ Volte aqui e clique em "Tentar novamente"
        </div>
        <button class="setup-btn" onclick="loadDrive()" style="margin-top:16px;">🔄 Tentar novamente</button>
        <button class="setup-btn" onclick="showConfig()"
                style="margin-top:8px;background:#fff;color:var(--pr);border:2px solid var(--pr);box-shadow:none;">
          🔑 Trocar chave
        </button>
      </div>
    </div>`;
}

// PROTEÇÕES
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if ((e.ctrlKey || e.metaKey) && ['s','u'].includes(k)) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();
});
document.addEventListener('dragstart', e => e.preventDefault());
</script>
